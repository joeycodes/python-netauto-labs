!
version 15.0
!
hostname DSW
!
enable secret 5 $1$abcd$xxxxxxxxxxxxx
!
no ip http server
ip ssh version 2
!
ntp server 10.0.0.1
ntp server 10.0.0.2
!
snmp-server community public RO
!
vlan 9
!
vlan 10
!
vlan 11
!
vlan 20
 mtu 9000
 private-vlan primary
 private-vlan association 21
!
vlan 99
 mtu 9000
!
vlan 999
 name Unused-Ports
 state suspend
!
interface Null0
 no ip unreachables
!
interface Loopback0
 ip address 10.255.255.1 255.255.255.255
 description ## Management Loopback ##
!
interface Port-channel1
 switchport access vlan 1
 switchport mode access
!
interface Port-channel2
 description ## Uplink to Core ##
 switchport trunk encapsulation dot1q
 switchport trunk native vlan 998
 switchport mode trunk
!
interface GigabitEthernet0/1
 description ## Uplink to ISP Router ##
 switchport trunk encapsulation dot1q
 switchport trunk native vlan 998
 switchport trunk allowed vlan 9,10,11,99
 switchport mode trunk
!
interface GigabitEthernet0/2
 description ## Link to SW2 ##
 switchport trunk encapsulation dot1q
 switchport trunk native vlan 998
 switchport trunk allowed vlan 1
 switchport mode trunk
!
interface GigabitEthernet0/11
 switchport access vlan 99
 switchport mode access
 channel-group 1 mode active
!
interface GigabitEthernet0/19
 description ## Unused Port ##
 switchport access vlan 999
 switchport mode access
 shutdown
!
interface GigabitEthernet0/28
 description ## Server Farm ##
 switchport access vlan 99
 switchport mode access
!
interface GigabitEthernet0/33
 description ## Private VLAN Host A ##
 switchport access vlan 20
 switchport private-vlan host-association 20 21
 switchport mode private-vlan host
!
interface Vlan9
 description ## Management VLAN ##
 ip address 10.9.0.1 255.255.255.0
 no shutdown
!
interface Vlan10
 description ## Data VLAN ##
 ip address 10.10.0.1 255.255.255.0
 no shutdown
!
interface Vlan11
 description ## Voice VLAN ##
 ip address 10.11.0.1 255.255.255.0
 no shutdown
!
interface Vlan20
 description ## Server VLAN ##
 ip address 10.20.0.1 255.255.255.0
 no shutdown
!
interface Vlan99
 description ## Native/Infra VLAN ##
 ip address 10.99.0.1 255.255.255.0
!
line vty 0 4
 transport input telnet ssh
 login local
!
end

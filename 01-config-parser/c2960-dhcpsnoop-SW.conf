!
version 12.2
no service pad
service timestamps debug uptime
service timestamps log uptime
no service password-encryption
!
hostname SW-FLOOR2
!
no aaa new-model
system mtu routing 1500
ip subnet-zero
!
spanning-tree mode pvst
spanning-tree extend system-id
!
vlan internal allocation policy ascending
!
vlan 2
 name Servers
!
vlan 3
 name Workstations
!
vlan 4
 name Printers
!
ip dhcp snooping vlan 2,3,4
ip dhcp snooping
!
interface FastEthernet0/1
 description ## Unconfigured ##
!
interface FastEthernet0/2
 description ## Server - Web01 ##
 switchport access vlan 2
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/3
 description ## Server - DB01 ##
 switchport access vlan 2
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/4
 description ## Server - DB02 ##
 switchport access vlan 2
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/5
 description ## Server - File01 ##
 switchport access vlan 2
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/6
 description ## Server - File02 ##
 switchport access vlan 2
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/7
 description ## Workstation - DevPC-01 ##
 switchport access vlan 3
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/8
 description ## Workstation - DevPC-02 ##
 switchport access vlan 3
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/9
 description ## Workstation - DevPC-03 ##
 switchport access vlan 3
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/10
 description ## Printer - LaserJet-01 ##
 switchport access vlan 4
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface FastEthernet0/11
 description ## Printer - LaserJet-02 ##
 switchport access vlan 4
 switchport mode access
 spanning-tree portfast
 ip dhcp snooping trust
!
interface GigabitEthernet0/1
 description ## Uplink to Core ##
 switchport mode trunk
 switchport trunk allowed vlan 2,3,4
!
interface GigabitEthernet0/2
 description ## Redundant Uplink ##
 switchport mode trunk
 switchport trunk allowed vlan 2,3,4
 shutdown
!
interface Vlan1
 no ip address
 shutdown
!
interface Vlan2
 description ## Server VLAN Mgmt ##
 ip address 192.168.2.1 255.255.255.0
!
ip dhcp pool vlan2
 network 192.168.2.0 255.255.255.0
 default-router 192.168.2.1
 dns-server 8.8.8.8 8.8.4.4
 lease 7
!
ip dhcp pool vlan3
 network 192.168.3.0 255.255.255.0
 default-router 192.168.3.1
 dns-server 8.8.8.8 8.8.4.4
 lease 7
!
ip dhcp pool vlan4
 network 192.168.4.0 255.255.255.0
 default-router 192.168.4.1
 dns-server 8.8.8.8
 lease 7
!
end

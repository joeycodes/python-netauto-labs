!
version 15.7
hostname R6
!
interface Loopback0
 description ## Router Loopback ##
 ip address 10.255.0.6 255.255.255.255
 no ip redirects
 no ip unreachables
 no ip proxy-arp
 ip nat inside
!
interface Null0
 no ip unreachables
!
interface Embedded-Service-Engine0/0
 no ip address
 shutdown
!
interface GigabitEthernet0/0
 description ## WAN - ISP Uplink ##
 ip address 203.0.113.2 255.255.255.252
 ip access-group Inbound in
 ip access-group Outbound out
 duplex auto
 speed auto
!
interface GigabitEthernet0/1
 description ## LAN - Internal Network ##
 ip address 192.168.1.1 255.255.255.0
 duplex auto
 speed auto
!
interface GigabitEthernet0/2
 description ## Unused ##
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface ATM0/0/0
 no ip address
 shutdown
 atm vc-per-vp 128
 no atm ilmi-keepalive
!
interface ATM0/0/0.38 point-to-point
 description ## Link to ISP (adsl-old) ##
 pvc 0/38
  encapsulation aal5mux ppp dialer
  dialer pool-member 1
!
interface Dialer1
 description ## PrimaryWAN DSL ##
 ip address negotiated
 ip access-group Inbound in
 ip access-group Outbound out
 encapsulation ppp
 dialer pool 1
 dialer persistent
!
interface Dialer2
 description ## BackupWAN ##
 ip address negotiated
 encapsulation ppp
 shutdown
 dialer pool 2
!
end
